<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title }} · pacsnode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
    <link rel="stylesheet" href="{{ route_prefix }}/static/admin.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">pacsnode</p>
          <h1>Admin Console</h1>
          <p class="sidebar-copy">Operational visibility for storage, ingest, and runtime health.</p>
        </div>
        <nav class="nav-list">
          <a href="{{ route_prefix }}" class="{% if active_nav == "dashboard" %}active{% endif %}">Dashboard</a>
          <a href="{{ route_prefix }}/system" class="{% if active_nav == "system" %}active{% endif %}">System</a>
          <a href="{{ route_prefix }}/users" class="{% if active_nav == "users" %}active{% endif %}">Users</a>
          <a href="{{ route_prefix }}/studies" class="{% if active_nav == "studies" %}active{% endif %}">Studies</a>
          <a href="{{ route_prefix }}/nodes" class="{% if active_nav == "nodes" %}active{% endif %}">Nodes</a>
          <a href="{{ route_prefix }}/audit" class="{% if active_nav == "audit" %}active{% endif %}">Audit</a>
        </nav>
        {% match logout_path %}
        {% when Some with (path) %}
        <form class="sidebar-logout" method="post" action="{{ path }}">
          <button type="submit" class="sidebar-logout-button">Sign out</button>
        </form>
        {% when None %}
        {% endmatch %}
      </aside>
      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
    <script>
      (() => {
        function initTransferSyntaxEditor(root) {
          const editors = root.querySelectorAll('[data-transfer-syntax-editor]');
          for (const editor of editors) {
            if (editor.dataset.transferSyntaxInitialized === 'true') {
              continue;
            }

            editor.dataset.transferSyntaxInitialized = 'true';

            const acceptedCheckboxes = Array.from(
              editor.querySelectorAll('input[name="accepted_transfer_syntaxes"]')
            );
            const preferredList = editor.querySelector('[data-preferred-syntax-list]');
            if (!preferredList || acceptedCheckboxes.length === 0) {
              continue;
            }

            let preferredOrder = Array.from(
              preferredList.querySelectorAll('[data-preferred-syntax-item]')
            ).map((item) => item.dataset.uid);

            function acceptedEntries() {
              return acceptedCheckboxes
                .filter((checkbox) => checkbox.checked)
                .map((checkbox) => ({
                  uid: checkbox.value,
                  label: checkbox.dataset.label || checkbox.value,
                  required: checkbox.dataset.required === 'true',
                }));
            }

            function renderPreferredList() {
              const selected = acceptedEntries();
              const selectedUids = selected.map((entry) => entry.uid);
              preferredOrder = preferredOrder.filter((uid) => selectedUids.includes(uid));
              for (const entry of selected) {
                if (!preferredOrder.includes(entry.uid)) {
                  preferredOrder.push(entry.uid);
                }
              }

              const selectedByUid = new Map(selected.map((entry) => [entry.uid, entry]));
              preferredList.replaceChildren();

              for (const uid of preferredOrder) {
                const entry = selectedByUid.get(uid);
                if (!entry) {
                  continue;
                }

                const item = document.createElement('div');
                item.className = 'syntax-order-item';
                if (entry.required) {
                  item.classList.add('syntax-order-item-required');
                }
                item.draggable = true;
                item.setAttribute('role', 'listitem');
                item.dataset.preferredSyntaxItem = 'true';
                item.dataset.uid = entry.uid;
                item.dataset.label = entry.label;

                const hidden = document.createElement('input');
                hidden.type = 'hidden';
                hidden.name = 'preferred_transfer_syntaxes';
                hidden.value = entry.uid;

                const handle = document.createElement('button');
                handle.type = 'button';
                handle.className = 'syntax-drag-handle';
                handle.setAttribute('aria-label', `Reorder ${entry.label}`);
                handle.textContent = '::';

                const copy = document.createElement('span');
                copy.className = 'syntax-option-copy syntax-option-inline';

                const strong = document.createElement('strong');
                strong.textContent = entry.label;

                const small = document.createElement('small');
                small.textContent = `- ${entry.uid}`;

                copy.append(strong, small);
                item.append(hidden, handle, copy);
                preferredList.append(item);
              }
            }

            function dragAfterElement(container, pointerY) {
              const items = Array.from(
                container.querySelectorAll('[data-preferred-syntax-item]:not(.dragging)')
              );

              return items.reduce(
                (closest, item) => {
                  const box = item.getBoundingClientRect();
                  const offset = pointerY - box.top - box.height / 2;
                  if (offset < 0 && offset > closest.offset) {
                    return { offset, element: item };
                  }
                  return closest;
                },
                { offset: Number.NEGATIVE_INFINITY, element: null }
              ).element;
            }

            editor.addEventListener('change', (event) => {
              if (event.target instanceof HTMLInputElement && event.target.name === 'accepted_transfer_syntaxes') {
                renderPreferredList();
              }
            });

            preferredList.addEventListener('dragstart', (event) => {
              if (!(event.target instanceof HTMLElement)) {
                return;
              }
              const item = event.target.closest('[data-preferred-syntax-item]');
              if (!(item instanceof HTMLElement)) {
                return;
              }
              item.classList.add('dragging');
              if (event.dataTransfer) {
                event.dataTransfer.effectAllowed = 'move';
                event.dataTransfer.setData('text/plain', item.dataset.uid || '');
              }
            });

            preferredList.addEventListener('dragend', (event) => {
              if (!(event.target instanceof HTMLElement)) {
                return;
              }
              const item = event.target.closest('[data-preferred-syntax-item]');
              if (!(item instanceof HTMLElement)) {
                return;
              }
              item.classList.remove('dragging');
              preferredOrder = Array.from(
                preferredList.querySelectorAll('[data-preferred-syntax-item]')
              ).map((entry) => entry.dataset.uid);
            });

            preferredList.addEventListener('dragover', (event) => {
              event.preventDefault();
              const dragging = preferredList.querySelector('.dragging');
              if (!(dragging instanceof HTMLElement)) {
                return;
              }
              const afterElement = dragAfterElement(preferredList, event.clientY);
              if (afterElement) {
                preferredList.insertBefore(dragging, afterElement);
              } else {
                preferredList.append(dragging);
              }
            });

            renderPreferredList();
          }
        }

        function initImportBrowser(root) {
          const browsers = root.querySelectorAll('[data-import-browser]');
          for (const browser of browsers) {
            if (browser.dataset.importBrowserInitialized === 'true') {
              continue;
            }

            browser.dataset.importBrowserInitialized = 'true';

            const browseUrl = browser.dataset.browseUrl;
            const input = browser.closest('form')?.querySelector('[data-import-path-input]');
            const shell = browser.parentElement?.querySelector('[data-import-browser-shell]');
            const current = shell?.querySelector('[data-import-browser-current]');
            const status = shell?.querySelector('[data-import-browser-status]');
            const list = shell?.querySelector('[data-import-browser-list]');
            const openButton = browser.querySelector('[data-import-browse-open]');
            const upButton = browser.querySelector('[data-import-browse-up]');

            if (!browseUrl || !(input instanceof HTMLInputElement) || !(shell instanceof HTMLElement) || !(current instanceof HTMLElement) || !(status instanceof HTMLElement) || !(list instanceof HTMLElement) || !(openButton instanceof HTMLButtonElement) || !(upButton instanceof HTMLButtonElement)) {
              continue;
            }

            function stopBrowseClick(event) {
              event.preventDefault();
              event.stopPropagation();
            }

            async function loadDirectory(path) {
              shell.hidden = false;
              status.textContent = 'Loading directories...';
              list.replaceChildren();
              try {
                const response = await fetch(`${browseUrl}?path=${encodeURIComponent(path || '/')}`, {
                  headers: { 'HX-Request': 'true' },
                });
                if (!response.ok) {
                  status.textContent = await response.text();
                  return;
                }
                const data = await response.json();
                input.value = data.current_path || path;
                current.textContent = data.current_path || path;
                status.textContent = data.entries.length > 0 ? 'Choose a subdirectory or scan the current folder.' : 'No subdirectories found here.';
                upButton.hidden = !data.parent_path;
                upButton.dataset.parentPath = data.parent_path || '';

                for (const entry of data.entries) {
                  const button = document.createElement('button');
                  button.type = 'button';
                  button.className = 'import-browser-entry';
                  button.textContent = entry.name;
                  button.addEventListener('click', (event) => {
                    stopBrowseClick(event);
                    loadDirectory(entry.path);
                  });
                  list.append(button);
                }
              } catch (error) {
                status.textContent = error instanceof Error ? error.message : 'Directory browse failed.';
              }
            }

            openButton.addEventListener('click', (event) => {
              stopBrowseClick(event);
              loadDirectory(input.value || '/');
            });
            upButton.addEventListener('click', (event) => {
              stopBrowseClick(event);
              loadDirectory(upButton.dataset.parentPath || '/');
            });
          }
        }

        function initImportCompletionRefresh(root) {
          const panels = root.querySelectorAll('#import-panel[data-import-refresh-studies="true"]');
          for (const panel of panels) {
            if (!(panel instanceof HTMLElement) || panel.dataset.importStudiesRefreshed === 'true') {
              continue;
            }

            panel.dataset.importStudiesRefreshed = 'true';

            const studiesResults = document.querySelector('#studies-results');
            if (!(studiesResults instanceof HTMLElement)) {
              continue;
            }

            const refreshHref = studiesResults.dataset.studiesRefreshHref;
            if (!refreshHref || typeof htmx === 'undefined') {
              continue;
            }

            htmx.ajax('GET', refreshHref, {
              target: '#studies-results',
              swap: 'outerHTML',
            });

            const statsShell = document.querySelector('#stats-shell');
            if (statsShell instanceof HTMLElement && statsShell.dataset.statsRefreshHref) {
              htmx.ajax('GET', statsShell.dataset.statsRefreshHref, {
                target: '#stats-shell',
                swap: 'outerHTML',
              });
            }
          }
        }

        // Toast system: HTMX fires "showToast" via HX-Trigger header
        function showToast(title, detail) {
          const stack = document.getElementById('toast-stack');
          if (!stack) return;

          const toast = document.createElement('article');
          toast.className = 'toast tone-success';
          toast.innerHTML =
            '<div class="activity-meta"><span class="activity-badge">SYSTEM</span></div>' +
            '<strong>' + title + '</strong>' +
            '<p>' + detail + '</p>';
          stack.prepend(toast);

          setTimeout(() => {
            if (!toast.isConnected) return;
            toast.style.transition = 'opacity 200ms ease, transform 200ms ease';
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(4px)';
            setTimeout(() => toast.remove(), 250);
          }, 5000);
        }

        // Also auto-dismiss SSE-delivered toasts on the dashboard
        function scheduleToastDismissal(el) {
          if (!(el instanceof HTMLElement) || el.dataset.toastScheduled === 'true') return;
          el.dataset.toastScheduled = 'true';
          const ms = Number.parseInt(el.dataset.autoDismiss || '5000', 10);
          setTimeout(() => {
            if (!el.isConnected) return;
            el.style.transition = 'opacity 200ms ease, transform 200ms ease';
            el.style.opacity = '0';
            el.style.transform = 'translateY(4px)';
            setTimeout(() => el.remove(), 250);
          }, Number.isFinite(ms) ? ms : 5000);
        }

        document.addEventListener('DOMContentLoaded', () => initTransferSyntaxEditor(document));
        document.addEventListener('DOMContentLoaded', () => initImportBrowser(document));
        document.addEventListener('DOMContentLoaded', () => initImportCompletionRefresh(document));

        // HX-Trigger event for toasts from system settings save
        document.body.addEventListener('showToast', (event) => {
          const d = event.detail || {};
          showToast(d.title || 'Done', d.detail || '');
        });

        document.addEventListener('htmx:load', (event) => {
          initTransferSyntaxEditor(event.target);
          initImportBrowser(event.target);
          initImportCompletionRefresh(event.target);
          // Auto-dismiss SSE-delivered toasts
          if (event.target instanceof HTMLElement) {
            event.target.querySelectorAll('.toast[data-auto-dismiss]').forEach(scheduleToastDismissal);
          }
        });
      })();
    </script>
  </body>
</html>
